# Retort Command Definitions for OmniPost
# Generated by Retort

commands:
  # Development
  dev:
    run: pnpm dev
    description: Start Next.js development server on http://localhost:3000
    category: development

  build:
    run: pnpm build
    description: Build production bundle with Next.js
    category: development

  start:
    run: pnpm start
    description: Start production server
    category: development

  # Quality checks
  lint:
    run: pnpm lint
    description: Run ESLint across the project
    category: quality

  lint_fix:
    run: pnpm lint:fix
    description: Run ESLint with auto-fix enabled
    category: quality

  format:
    run: pnpm format
    description: Format all files with Prettier
    category: quality

  format_check:
    run: pnpm format:check
    description: Check formatting without writing changes
    category: quality

  type_check:
    run: pnpm type-check
    description: Run TypeScript compiler in noEmit mode for type validation
    category: quality

  check_all:
    run: pnpm check-all
    description: Run all quality gates in sequence (type-check, lint, format:check, test)
    category: quality

  # Testing
  test:
    run: pnpm test
    description: Run Jest test suite
    category: testing

  test_watch:
    run: pnpm test:watch
    description: Run Jest in watch mode for development
    category: testing

  test_coverage:
    run: pnpm test:coverage
    description: Run Jest with coverage reporting
    category: testing

  # Database
  db_generate:
    run: pnpm db:generate
    description: Generate Prisma client from schema
    category: database

  db_push:
    run: pnpm db:push
    description: Push Prisma schema changes to database without migrations
    category: database

  db_migrate:
    run: pnpm db:migrate
    description: Create and apply Prisma migrations
    category: database

  db_studio:
    run: pnpm db:studio
    description: Open Prisma Studio database GUI
    category: database

  # Retort utilities
  validate_skills:
    run: "find .agents/skills -name '*.md' | wc -l && echo 'skills found'"
    description: Validate that all marketing agent skills are present and well-formed
    category: retort

  retort_sync:
    run: "echo 'Retort sync: regenerating agent config files from .agentkit/spec/'"
    description: Regenerate CLAUDE.md, AGENTS.md, cursor/windsurf rules from Retort spec
    category: retort
