# Retort Command Definitions for OmniPost
# Generated by Retort

commands:
  # Development
  dev:
    run: pnpm dev
    description: Start Next.js development server on http://localhost:3000
    category: development

  build:
    run: pnpm build
    description: Build production bundle with Next.js
    category: development

  start:
    run: pnpm start
    description: Start production server
    category: development

  # Quality checks
  lint:
    run: pnpm lint
    description: Run ESLint across the project
    category: quality

  lint_fix:
    run: pnpm lint:fix
    description: Run ESLint with auto-fix enabled
    category: quality

  format:
    run: pnpm format
    description: Format all files with Prettier
    category: quality

  format_check:
    run: pnpm format:check
    description: Check formatting without writing changes
    category: quality

  type_check:
    run: pnpm type-check
    description: Run TypeScript compiler in noEmit mode for type validation
    category: quality

  check_all:
    run: pnpm check-all
    description: Run all quality gates in sequence (type-check, lint, format:check, test)
    category: quality

  # Testing
  test:
    run: pnpm test
    description: Run Jest test suite
    category: testing

  test_watch:
    run: pnpm test:watch
    description: Run Jest in watch mode for development
    category: testing

  test_coverage:
    run: pnpm test:coverage
    description: Run Jest with coverage reporting
    category: testing

  # Database
  db_generate:
    run: pnpm db:generate
    description: Generate Prisma client from schema
    category: database

  db_push:
    run: pnpm db:push
    description: Push Prisma schema changes to database without migrations
    category: database

  db_migrate:
    run: pnpm db:migrate
    description: Create and apply Prisma migrations
    category: database

  db_studio:
    run: pnpm db:studio
    description: Open Prisma Studio database GUI
    category: database

  # Retort utilities
  validate_skills:
    run: "bash .agents/validate-skills.sh"
    description: Validate all 34 marketing skills against Agent Skills Specification
    category: retort
    timeout_seconds: 30

  retort_sync:
    run: "npx retort sync 2>/dev/null || echo 'Retort CLI not installed — manually update generated files'"
    description: Regenerate CLAUDE.md, AGENTS.md, cursor/windsurf rules from Retort spec
    category: retort
    timeout_seconds: 60

  # Composite workflows
  setup_dev:
    run: "pnpm install && pnpm db:generate"
    description: Install dependencies and generate Prisma client for development
    category: development
    prerequisites: ["node >= 18", "pnpm >= 9"]

  prepare_pr:
    run: "pnpm check-all && bash .agents/validate-skills.sh"
    description: Run all quality gates and validate skills before creating a PR
    category: quality
