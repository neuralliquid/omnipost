# Retort Project Specification for OmniPost
# Generated by Retort

project:
  name: OmniPost
  description: "AI-powered multi-platform content publishing. Publish everywhere, manage anywhere."
  tagline: "One platform. All channels."
  type: SaaS
  repository: https://github.com/phoenixvc/omnipost
  live_url: https://nl-dev-omnipost-app-euw.azurewebsites.net

stack:
  framework: Next.js 16
  ui: React 19
  language: TypeScript 5.3
  language_mode: strict
  orm: Prisma 7
  validation: Zod 3
  auth: JWT
  styling: CSS Modules
  testing:
    runner: Jest 29
    component: React Testing Library
    accessibility: jest-axe
  package_manager: pnpm 9
  deployment: Azure Web Apps
  iac: Bicep
  ci_cd: GitHub Actions
  sanitization: DOMPurify
  rate_limiting: "@upstash/ratelimit"

quality_gates:
  lint:
    command: pnpm lint
    description: Run ESLint with Next.js and TypeScript rules
  typecheck:
    command: pnpm type-check
    description: TypeScript strict mode compilation check
  test:
    command: pnpm test
    description: Run Jest test suite
  format:
    command: pnpm format:check
    description: Prettier formatting verification
  check_all:
    command: pnpm check-all
    description: Run all quality gates in sequence (type-check, lint, format:check, test)
  coverage:
    target: 80
    command: pnpm test:coverage

process:
  branching:
    pattern: "<type>/<description>"
    types:
      - feature
      - fix
      - docs
      - refactor
      - test
      - chore
  commits:
    format: "conventional"
    pattern: "<type>(<scope>): <description>"
    types:
      - feat
      - fix
      - docs
      - test
      - refactor
      - chore
      - ci
      - perf
  pull_requests:
    base_branch: main
    require_checks: true
    pre_submit: pnpm check-all

conventions:
  file_naming:
    components: PascalCase
    utilities: camelCase
    api_routes: kebab-case
    types: PascalCase
    tests: "<source>.test.<ext>"
    css_modules: "<Component>.module.css"
  routing:
    style: App Router
    api_directory: app/api/
    legacy_directory: pages/api/ # deprecated, do not add new routes
  components:
    style: functional
    exports: named
    state: hooks
  api:
    authentication: "await isAuthenticated()"
    validation: Zod schemas
    sanitization: DOMPurify
    rate_limiting: withRateLimit wrapper
    error_format: "{ error, details?, code? }"
    success_format: "{ success, data, message? }"

targets:
  performance: "API responses < 2s"
  security: "OWASP Top 10 compliance"
  accessibility: "WCAG 2.1 AA"
  browser_support: "Last 2 versions of modern browsers"
  mobile: "Responsive design required"
