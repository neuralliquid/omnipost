# Retort Rules for OmniPost
# Generated by Retort

rules:
  # Security rules -- highest priority
  security:
    - id: auth-await
      severity: critical
      rule: "ALWAYS use `await isAuthenticated()` -- it is async. Missing await is a security bypass."
      applies_to: "app/api/**"

    - id: zod-validation
      severity: critical
      rule: "ALWAYS validate input with Zod schemas before processing any user-supplied data."
      applies_to: "app/api/**"

    - id: dompurify-sanitization
      severity: critical
      rule: "ALWAYS sanitize user input using DOMPurify via `app/api/_utils/sanitize.ts` utilities."
      applies_to: "app/api/**"

    - id: rate-limiting
      severity: critical
      rule: "ALWAYS apply rate limiting to public and protected endpoints using withRateLimit wrapper."
      applies_to: "app/api/**"

    - id: no-stack-traces
      severity: critical
      rule: "NEVER expose stack traces or internal error details in production responses."
      applies_to: "**"

    - id: no-secrets
      severity: critical
      rule: "NEVER commit secrets, API keys, or credentials. Use environment variables and .env.local."
      applies_to: "**"

    - id: env-validation
      severity: high
      rule: "ALWAYS validate required environment variables at startup. Fail fast on missing values."
      applies_to: "lib/config/**"

  # TypeScript rules
  typescript:
    - id: strict-mode
      severity: high
      rule: "Use TypeScript strict mode. No `any` types -- use `unknown` if the type is truly unknown."
      applies_to: "**/*.ts,**/*.tsx"

    - id: explicit-types
      severity: medium
      rule: "Define explicit types for function parameters and return values on public APIs."
      applies_to: "**/*.ts,**/*.tsx"

    - id: interfaces-for-objects
      severity: medium
      rule: "Use interfaces for object shapes and types for unions/primitives."
      applies_to: "**/*.ts,**/*.tsx"

  # React rules
  react:
    - id: functional-components
      severity: high
      rule: "ALWAYS use functional components with hooks. No class components."
      applies_to: "components/**,app/**"

    - id: named-exports
      severity: medium
      rule: "PREFER named exports over default exports for components."
      applies_to: "components/**"

    - id: css-modules
      severity: medium
      rule: "USE CSS Modules for component-specific styles. File name must match component."
      applies_to: "components/**"

    - id: prop-types
      severity: high
      rule: "ALWAYS define component prop types with TypeScript interfaces."
      applies_to: "components/**"

    - id: accessibility
      severity: high
      rule: "Use semantic HTML, ARIA labels on interactive elements, and ensure keyboard navigation."
      applies_to: "components/**,app/**"

  # API rules
  api:
    - id: app-router-only
      severity: high
      rule: "Use App Router (app/api/) for new routes. NEVER add new routes to pages/api/ (legacy)."
      applies_to: "app/api/**"

    - id: async-handlers
      severity: medium
      rule: "ALWAYS use async route handlers."
      applies_to: "app/api/**"

    - id: error-format
      severity: medium
      rule: "Return consistent error format: { error: string, details?: string, code?: string }."
      applies_to: "app/api/**"

    - id: http-status-codes
      severity: medium
      rule: "Return proper HTTP status codes: 200/201 success, 400 bad input, 401 unauth, 404 not found, 500 server error."
      applies_to: "app/api/**"

  # Testing rules
  testing:
    - id: test-coverage
      severity: medium
      rule: "Target 80% code coverage. Test happy paths, error cases, auth, and validation."
      applies_to: "__tests__/**,tests/**"

    - id: test-structure
      severity: medium
      rule: "Use Arrange-Act-Assert pattern. Mirror source structure in test directory."
      applies_to: "__tests__/**,tests/**"

    - id: mock-externals
      severity: medium
      rule: "ALWAYS mock external services (Airtable, Slack, Twilio, etc.) in tests."
      applies_to: "__tests__/**,tests/**"

    - id: descriptive-names
      severity: low
      rule: "Use descriptive test names: 'should return 401 when user is not authenticated'."
      applies_to: "__tests__/**,tests/**"

  # Documentation rules
  docs:
    - id: jsdoc-public
      severity: low
      rule: "Use JSDoc for public functions and complex logic. Explain why, not what."
      applies_to: "**/*.ts,**/*.tsx"

    - id: todo-context
      severity: low
      rule: "Mark TODOs with clear context about what needs to be done and why."
      applies_to: "**"
