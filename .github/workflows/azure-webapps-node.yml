name: Azure Web App - Node.js CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  ORG_CODE: 'nl'
  PROJECT_NAME: 'omnipost'
  REGION_CODE: 'euw'
  LOCATION: 'westeurope'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache Next.js build
        uses: actions/cache@v3
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install, build, and test
        run: |
          pnpm install --frozen-lockfile
          pnpm run type-check
          pnpm run lint
          pnpm run build
          pnpm test
        env:
          JWT_SECRET: test-secret-key-for-deployment-ci

      - name: Prepare deployment package
        run: |
          # Create deployment directory
          mkdir -p deploy
          
          # Copy standalone server (includes minimal dependencies)
          cp -r .next/standalone/. deploy/
          
          # Copy static assets
          mkdir -p deploy/.next/static
          cp -r .next/static/. deploy/.next/static/
          
          # Copy public directory
          cp -r public deploy/public || true
          
          # Copy data directory (required for feature flags and configuration)
          cp -r data deploy/data || true
          
          # Fix package.json start script for standalone mode
          # The standalone build includes a server.js that should be run directly
          if [ -f deploy/package.json ]; then
            # Update the start script to run the standalone server
            node -e "const pkg = require('./deploy/package.json'); pkg.scripts = pkg.scripts || {}; pkg.scripts.start = 'node server.js'; require('fs').writeFileSync('./deploy/package.json', JSON.stringify(pkg, null, 2));"
            echo "✓ Updated package.json start script for standalone mode"
          fi
          
          # Copy startup script (backup option)
          cp startup.sh deploy/
          chmod +x deploy/startup.sh
          
          echo "✓ Standalone deployment package contents:"
          find deploy -maxdepth 2 -print | head -20
          echo "✓ Package size:"
          du -sh deploy/

      - name: Zip artifact for deployment
        run: cd deploy && zip -r ../node-app.zip ./*

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: node-app.zip

  infrastructure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify naming script exists
        run: |
          if [ ! -f "./infra/naming.sh" ]; then
            echo "ERROR: naming.sh not found!"
            ls -la infra/
            exit 1
          fi
          echo "✓ naming.sh found"

      - name: Generate Resource Names
        id: generate-names
        run: |
          chmod +x ./infra/naming.sh
          while IFS= read -r line; do
            echo "$line" >> $GITHUB_ENV
          done < <(./infra/naming.sh ${{ env.ORG_CODE }} ${{ github.event.inputs.environment || 'dev' }} ${{ env.PROJECT_NAME }} ${{ env.REGION_CODE }})

      - name: Azure Login
        uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        uses: azure/cli@4db43908b9df2e7ac93c8275a8f9a448c59338dd # v1
        with:
          inlineScript: |
            az group create --name ${{ env.RESOURCE_GROUP }} --location ${{ env.LOCATION }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@65ae74fb7aec7c680c88ef456811f353adae4d06 # v1
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >
            org=${{ env.ORG_CODE }}
            env=${{ github.event.inputs.environment || 'dev' }}
            project=${{ env.PROJECT_NAME }}
            region=${{ env.REGION_CODE }}
            location=${{ env.LOCATION }}

  deploy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: infrastructure
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/naming.sh
          sparse-checkout-cone-mode: false

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip -o node-app.zip

      - name: Azure Login
        uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Generate Resource Names
        id: generate-names
        run: |
          chmod +x ./infra/naming.sh
          while IFS= read -r line; do
            echo "$line" >> $GITHUB_ENV
          done < <(./infra/naming.sh ${{ env.ORG_CODE }} ${{ github.event.inputs.environment || 'dev' }} ${{ env.PROJECT_NAME }} ${{ env.REGION_CODE }})

      - name: 'Deploy to Azure WebApp'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@657f0700ea5214d56a0400d8ac5e8023c963d25d # v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Verify deployment health
        run: |
          echo "Waiting 30 seconds for app to start..."
          sleep 30
          
          APP_URL="https://${{ env.APP_NAME }}.azurewebsites.net"
          echo "Testing health endpoint: ${APP_URL}/api/health"
          
          MAX_RETRIES=5
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/health" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed! App is running."
              curl -s "${APP_URL}/api/health" | jq .
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⚠️  Attempt $RETRY_COUNT/$MAX_RETRIES: Health check returned $HTTP_CODE"
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Retrying in 10 seconds..."
                sleep 10
              fi
            fi
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          echo "Deployment may have issues. Check Azure logs:"
          echo "az webapp log tail --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}"
          exit 1
