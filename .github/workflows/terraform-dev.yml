name: Terraform Dev

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform-dev.yml'
  push:
    branches: ['main']
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform-dev.yml'

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1
        with:
          client-id: 4fc0d52a-718a-49de-a709-a12ad3965d9d
          tenant-id: 9530cd32-9e33-47f0-9247-ed964730b580
          subscription-id: bb4e3882-2079-4bab-8974-611bc0b8bb58

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=infra/terraform/env/dev init

      - name: Terraform Format
        run: terraform -chdir=infra/terraform/env/dev fmt -check

      - name: Terraform Validate
        run: terraform -chdir=infra/terraform/env/dev validate

      - name: Terraform Plan
        run: terraform -chdir=infra/terraform/env/dev plan -no-color -out=tfplan
        env:
          TF_VAR_sluice_azure_openai_endpoint: ${{ secrets.SLUICE_AZURE_OPENAI_ENDPOINT }}
          TF_VAR_sluice_azure_openai_api_key: ${{ secrets.SLUICE_AZURE_OPENAI_API_KEY }}
          TF_VAR_sluice_api_key: ${{ secrets.SLUICE_API_KEY }}

      - name: Terraform Apply
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' }}
        run: terraform -chdir=infra/terraform/env/dev apply -auto-approve tfplan
